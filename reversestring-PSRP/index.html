<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #222;
        }

        #inputText {
            width: 100%;
            padding: 10px 14px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        #inputText:focus {
            border-color: #3b82f6;
        }

        #reverseBtn {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #reverseBtn:hover {
            background-color: #2563eb;
        }

        #outputText {
            padding: 12px 14px;
            font-size: 1rem;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-height: 48px;
            color: #333;
            word-break: break-all;
        }

        #copyBtn {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4b5563;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #copyBtn:hover {
            background-color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. Title -->
        <h1>Reverse String</h1>

        <!-- 2. Input -->
        <input type="text" id="inputText" placeholder="Enter text to reverse..." />

        <!-- 3. Reverse button -->
        <button id="reverseBtn">Reverse 🔄</button>

        <!-- 4. Output paragraph -->
        <p id="outputText"></p>

        <!-- 5. Copy button -->
        <button id="copyBtn">Copy 🗒️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
